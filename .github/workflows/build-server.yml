name: Build Server Binaries

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Hub - Linux x64
            os: ubuntu-latest
            package: nexus-hub
            artifact-label: linux-x64
          - name: Hub - Windows x64
            os: windows-latest
            package: nexus-hub
            artifact-label: win-x64
          - name: Bootstrap - Linux x64
            os: ubuntu-latest
            package: nexus-bootstrap
            artifact-label: linux-x64
          - name: Bootstrap - Windows x64
            os: windows-latest
            package: nexus-bootstrap
            artifact-label: win-x64

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build -p ${{ matrix.package }} --release

      - name: Rename artifact
        shell: bash
        run: |
          BIN="${{ matrix.package }}"
          LABEL="${{ matrix.artifact-label }}"
          if [ "$RUNNER_OS" = "Windows" ]; then
            mv "target/release/${BIN}.exe" "target/release/${BIN}-${LABEL}.exe"
          else
            mv "target/release/${BIN}" "target/release/${BIN}-${LABEL}"
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/${{ matrix.package }}-${{ matrix.artifact-label }}*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
