name: Build Desktop App

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS ARM64
            os: macos-latest
            builder-args: --mac --arm64
            artifact-label: osx-arm64
          # - name: macOS x86_64
          #   os: macos-latest
          #   builder-args: --mac --x64
          #   rust-target: x86_64-apple-darwin
          #   artifact-label: osx-x64
          - name: Linux x64
            os: ubuntu-latest
            builder-args: --linux -c.linux.target=AppImage -c.linux.target=deb
            artifact-label: linux-x64
          - name: Windows x64
            os: windows-latest
            builder-args: --win
            artifact-label: win-x64

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust cross-compilation target
        if: matrix.rust-target
        run: rustup target add ${{ matrix.rust-target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libnss3-dev libatk-bridge2.0-dev libdrm-dev libgbm-dev libasound2-dev

      - name: Install npm dependencies
        shell: bash
        run: |
          rm -f package-lock.json
          npm install --ignore-scripts
          node node_modules/electron/install.js

      - name: Build native addon (p2p-core)
        working-directory: packages/p2p-core
        shell: bash
        run: ../../node_modules/.bin/napi build --platform --release ${{ matrix.rust-target && format('--target {0}', matrix.rust-target) }}

      - name: Build desktop app
        working-directory: apps/desktop
        shell: bash
        run: |
          ../../node_modules/.bin/electron-vite build
          ELECTRON_VER=$(node -p "require('../../node_modules/electron/package.json').version")
          ../../node_modules/.bin/electron-builder ${{ matrix.builder-args }} --publish never -c.electronVersion=$ELECTRON_VER
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename artifacts
        shell: bash
        run: |
          cd apps/desktop/dist
          VERSION=${GITHUB_REF_NAME#v}
          LABEL="${{ matrix.artifact-label }}"

          # Rename user-facing downloads
          for f in *.dmg; do [ -f "$f" ] && mv "$f" "nexus-${VERSION}-${LABEL}.dmg"; done || true
          for f in *.exe; do [ -f "$f" ] && mv "$f" "nexus-${VERSION}-${LABEL}-setup.exe"; done || true
          for f in *.AppImage; do [ -f "$f" ] && mv "$f" "nexus-${VERSION}-${LABEL}.AppImage"; done || true
          for f in *.deb; do [ -f "$f" ] && mv "$f" "nexus-${VERSION}-${LABEL}.deb"; done || true

          # Rename auto-update zip (macOS)
          for f in *.zip; do [ -f "$f" ] && mv "$f" "nexus-${VERSION}-${LABEL}.zip"; done || true

          # Update yml manifests to reference renamed files
          for yml in latest*.yml; do
            [ -f "$yml" ] || continue
            sed -i.bak "s|url: .*\\.exe|url: nexus-${VERSION}-${LABEL}-setup.exe|" "$yml"
            sed -i.bak "s|url: .*\\.zip|url: nexus-${VERSION}-${LABEL}.zip|" "$yml"
            sed -i.bak "s|url: .*\\.AppImage|url: nexus-${VERSION}-${LABEL}.AppImage|" "$yml"
            sed -i.bak "s|path: .*|path: nexus-${VERSION}-${LABEL}|" "$yml"
            rm -f "$yml.bak"
          done

          # Clean up blockmaps
          rm -f *.blockmap
          ls -la

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/dist/nexus-*
            apps/desktop/dist/latest*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
